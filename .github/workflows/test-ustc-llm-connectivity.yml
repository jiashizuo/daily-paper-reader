name: test-ustc-llm-connectivity

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/test-ustc-llm-connectivity.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.llm.ustc.edu.cn/v1' }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-v4-flash-ascend' }}

    steps:
      - name: Test endpoint without API key
        run: |
          set -euo pipefail
          BASE="${DEEPSEEK_BASE_URL%/}"
          if [[ "$BASE" == */chat/completions ]]; then
            URL="$BASE"
          elif [[ "$BASE" =~ /v[0-9]+$ ]]; then
            URL="$BASE/chat/completions"
          else
            URL="$BASE/v1/chat/completions"
          fi
          echo "Testing TCP/HTTPS connectivity to: $URL"
          HTTP_CODE="$(curl -sS -o /tmp/ustc_no_key_body.txt -w '%{http_code}' --connect-timeout 20 --max-time 40 "$URL" || true)"
          echo "HTTP status without key: ${HTTP_CODE:-curl_failed}"
          if [ -s /tmp/ustc_no_key_body.txt ]; then
            head -c 500 /tmp/ustc_no_key_body.txt
            echo
          fi
          if [ "${HTTP_CODE}" = "000" ] || [ -z "${HTTP_CODE}" ]; then
            echo "::error::GitHub Actions cannot connect to the USTC LLM endpoint."
            exit 1
          fi

      - name: Test chat completion with secret key
        run: |
          set -euo pipefail
          if [ -z "${DEEPSEEK_API_KEY:-}" ]; then
            echo "::error::DEEPSEEK_API_KEY secret is empty."
            exit 1
          fi
          BASE="${DEEPSEEK_BASE_URL%/}"
          if [[ "$BASE" == */chat/completions ]]; then
            URL="$BASE"
          elif [[ "$BASE" =~ /v[0-9]+$ ]]; then
            URL="$BASE/chat/completions"
          else
            URL="$BASE/v1/chat/completions"
          fi
          PAYLOAD="$(printf '{"model":"%s","messages":[{"role":"user","content":"您好"}]}' "$DEEPSEEK_MODEL")"
          HTTP_CODE="$(curl -sS -o /tmp/ustc_key_body.txt -w '%{http_code}' \
            --connect-timeout 20 \
            --max-time 60 \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${DEEPSEEK_API_KEY}" \
            -d "$PAYLOAD" \
            "$URL" || true)"
          echo "HTTP status with key: ${HTTP_CODE:-curl_failed}"
          if [ -s /tmp/ustc_key_body.txt ]; then
            head -c 1000 /tmp/ustc_key_body.txt
            echo
          fi
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::USTC LLM chat completion request failed."
            exit 1
          fi
